[build]
  publish = "public"

[[edge_functions]]
  function = "auth"
  path = "/*"
  excludedPath = "/registry.json"

# Serve registry.json directly (bypass SPA catch-all)
[[redirects]]
  from = "/registry.json"
  to = "/registry.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
